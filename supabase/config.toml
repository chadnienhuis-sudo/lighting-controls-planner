# Local Supabase stack configuration. See https://supabase.com/docs/guides/local-development/cli/config
# for the full reference. Kept minimal; uncomment sections when a feature is adopted.

project_id = "lighting-controls-planner"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Email testing inbox — all auth emails land here in local dev instead of real inboxes.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Next.js dev server runs on port 3200 in this repo (see package.json "dev" script).
site_url = "http://localhost:3200"
additional_redirect_urls = ["http://localhost:3200/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# Magic links are the primary method for contractors/designers; no passwords in v1.
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Google sign-in — enabled in config but requires GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
# and GOTRUE_EXTERNAL_GOOGLE_SECRET in the local env to actually work. Configure
# before using; leaving empty is fine — the provider is disabled at runtime when
# credentials are absent.
[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""
skip_nonce_check = false
